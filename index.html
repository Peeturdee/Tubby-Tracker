<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pete's Tubby Tracker</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --accent: #4fc3f7;
    --accent-dim: #1a3a4a;
    --text: #e8eaf0;
    --muted: #6b7080;
    --today: #4fc3f7;
    --entered: #81c784;
    --font-mono: 'Courier New', monospace;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    padding: 16px 12px 40px;
  }

  header {
    text-align: center;
    padding: 20px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }

  header h1 {
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 400;
    margin-bottom: 4px;
  }

  #month-label {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
    display: block;
  }

  .summary {
    font-size: 11px;
    color: var(--muted);
    margin-top: 10px;
  }

  .summary span {
    color: var(--accent);
    font-family: var(--font-mono);
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    padding: 8px 6px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }

  thead th:nth-child(2),
  thead th:nth-child(3) { text-align: right; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:active { background: var(--accent-dim); }
  tbody tr.today { background: rgba(79, 195, 247, 0.06); }
  tbody tr.entered { background: rgba(129, 199, 132, 0.04); }

  td {
    padding: 11px 6px;
    font-size: 14px;
    vertical-align: middle;
  }

  .date-cell { font-size: 13px; }

  .day-name {
    font-size: 11px;
    color: var(--muted);
    display: block;
  }

  .day-num {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
  }

  tr.today .day-num { color: var(--today); }
  tr.past .day-num { color: var(--muted); }

  .lbs-cell { text-align: right; }

  .lbs-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-size: 15px;
    font-family: var(--font-mono);
    text-align: right;
    width: 70px;
    padding: 2px 0;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }

  .lbs-input:focus { border-bottom-color: var(--accent); color: var(--accent); }
  .lbs-input.has-value { color: var(--entered); border-bottom-color: transparent; }

  .stones-cell {
    text-align: right;
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--muted);
    min-width: 64px;
    white-space: nowrap;
  }

  .stones-cell.has-value { color: var(--text); }

  .today-badge {
    display: inline-block;
    background: var(--today);
    color: var(--bg);
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 1px 4px;
    border-radius: 3px;
    text-transform: uppercase;
    vertical-align: middle;
    margin-left: 4px;
  }

  .clear-btn {
    display: block;
    margin: 28px auto 0;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 20px;
    border-radius: 4px;
    cursor: pointer;
  }

  .legend {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 24px;
    font-size: 10px;
    color: var(--muted);
  }

  .legend-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
  }

  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
</style>
</head>
<body>

<header>
  <h1>Pete's Tubby Tracker</h1>
  <span id="month-label"></span>
  <div class="summary" id="summary">Enter your daily weight in lbs</div>
</header>

<table>
  <thead>
    <tr>
      <th>Date</th>
      <th>lbs</th>
      <th>st &amp; lb</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<button class="clear-btn" onclick="clearAll()">Clear all data</button>

<div class="legend">
  <span><span class="legend-dot" style="background:#4fc3f7"></span>Today</span>
  <span><span class="legend-dot" style="background:#81c784"></span>Logged</span>
</div>

<script>
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTHS_LONG = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const STORAGE_KEY = 'weightTracker_v1';

function toStonesLbs(lbs) {
  if (!lbs || isNaN(lbs)) return '—';
  const totalLbs = Math.round(lbs);
  const stones = Math.floor(totalLbs / 14);
  const remLbs = totalLbs % 14;
  return `${stones}st ${remLbs}lb`;
}

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function updateSummary(data) {
  const entries = Object.values(data).filter(v => v !== '');
  const el = document.getElementById('summary');
  if (entries.length === 0) {
    el.innerHTML = 'Enter your daily weight in lbs';
    return;
  }
  const nums = entries.map(Number);
  const avg = (nums.reduce((a,b)=>a+b,0)/nums.length).toFixed(1);
  const min = Math.min(...nums).toFixed(1);
  const max = Math.max(...nums).toFixed(1);
  el.innerHTML = `<span>${entries.length}</span> entries &nbsp;·&nbsp; avg <span>${avg}</span> lbs &nbsp;·&nbsp; range <span>${min}–${max}</span>`;
}

function build() {
  const data = loadData();
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  const today = new Date();
  today.setHours(0,0,0,0);

  const year = today.getFullYear();
  const month = today.getMonth();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  document.getElementById('month-label').textContent = `${MONTHS_LONG[month]} ${year}`;

  let todayRow = null;

  for (let i = 1; i <= daysInMonth; i++) {
    const d = new Date(year, month, i);
    const key = dateKey(d);
    const isToday = d.getTime() === today.getTime();
    const isPast = d < today;

    const tr = document.createElement('tr');
    if (isToday) tr.classList.add('today');
    if (isPast && !isToday) tr.classList.add('past');
    if (data[key]) tr.classList.add('entered');
    if (isToday) todayRow = tr;

    // Date cell
    const tdDate = document.createElement('td');
    tdDate.className = 'date-cell';
    const todayBadge = isToday ? `<span class="today-badge">Today</span>` : '';
    tdDate.innerHTML = `
      <span class="day-name">${DAYS[d.getDay()]} ${MONTHS_SHORT[month]}</span>
      <span class="day-num">${d.getDate()}${todayBadge}</span>
    `;
    tr.appendChild(tdDate);

    // lbs input cell
    const tdLbs = document.createElement('td');
    tdLbs.className = 'lbs-cell';
    const input = document.createElement('input');
    input.type = 'number';
    input.min = '50';
    input.max = '600';
    input.step = '0.1';
    input.placeholder = '0.0';
    input.className = 'lbs-input' + (data[key] ? ' has-value' : '');
    if (data[key]) input.value = data[key];
    input.setAttribute('inputmode', 'decimal');

    input.addEventListener('change', () => {
      const val = parseFloat(input.value);
      if (isNaN(val) || input.value === '') {
        delete data[key];
        input.classList.remove('has-value');
        tdStones.textContent = '—';
        tdStones.classList.remove('has-value');
        tr.classList.remove('entered');
      } else {
        const rounded = Math.round(val * 10) / 10;
        input.value = rounded.toFixed(1);
        data[key] = rounded.toFixed(1);
        input.classList.add('has-value');
        tdStones.textContent = toStonesLbs(rounded);
        tdStones.classList.add('has-value');
        tr.classList.add('entered');
      }
      saveData(data);
      updateSummary(data);
    });

    tdLbs.appendChild(input);
    tr.appendChild(tdLbs);

    // Stones cell
    const tdStones = document.createElement('td');
    tdStones.className = 'stones-cell' + (data[key] ? ' has-value' : '');
    tdStones.textContent = data[key] ? toStonesLbs(data[key]) : '—';
    tr.appendChild(tdStones);

    tbody.appendChild(tr);
  }

  updateSummary(data);

  // Scroll today into view
  if (todayRow) {
    setTimeout(() => todayRow.scrollIntoView({ behavior: 'smooth', block: 'center' }), 150);
  }
}

function clearAll() {
  if (confirm('Clear all weight entries?')) {
    localStorage.removeItem(STORAGE_KEY);
    build();
  }
}

build();
</script>
</body>
</html>
